<style>
  :root{
    --bg:#0b1220;
    --bg-2:#121b30;
    --card:#16213a;
    --card-2:#1c2a48;
    --teal:#2dd4bf;
    --orange:#f59e0b;
    --text:#e7ecf5;
    --muted:#8b95ab;
    --danger:#f87171;
    --border:#243252;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh;
    background:
      radial-gradient(ellipse at 20% 0%, rgba(45,212,191,0.10), transparent 55%),
      radial-gradient(ellipse at 90% 100%, rgba(245,158,11,0.08), transparent 55%),
      var(--bg);
    color:var(--text);
    font-family:'Inter', sans-serif;
    padding-bottom:100px;
  }
  h1,h2,h3{ font-family:'Poppins', sans-serif; margin:0; }

  /* ===== LOCK SCREEN ===== */
  #lockScreen{
    position:fixed; inset:0; z-index:200;
    background:var(--bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:16px; padding:24px; text-align:center;
  }
  #lockScreen.hidden{ display:none; }
  .lock-icon{
    width:72px; height:72px; border-radius:20px;
    background:linear-gradient(135deg, var(--teal), #14877a);
    display:flex; align-items:center; justify-content:center;
    font-size:32px; margin-bottom:6px;
    box-shadow:0 10px 30px rgba(45,212,191,0.35);
  }
  #lockScreen h2{ font-size:20px; }
  #lockScreen p{ color:var(--muted); font-size:14px; margin:0 0 8px; }
  #lockInput, #adminInput, #newPassInput, #fileNameInput{
    width:100%; max-width:280px; padding:14px 16px; border-radius:14px;
    border:1px solid var(--border); background:var(--card); color:var(--text);
    font-size:16px; outline:none; text-align:center;
  }
  #lockInput:focus, #adminInput:focus, #newPassInput:focus{ border-color:var(--teal); }
  .btn{
    padding:14px 28px; border-radius:14px; border:none;
    background:linear-gradient(135deg, var(--teal), #14877a);
    color:#04231f; font-weight:700; font-size:15px; cursor:pointer;
    font-family:'Poppins', sans-serif;
  }
  .btn:active{ transform:scale(0.97); }
  .btn-outline{
    background:transparent; border:1px solid var(--border); color:var(--text); font-weight:600;
  }
  #lockError, #adminError, #adminMsg{ color:var(--danger); font-size:13px; min-height:18px; }

  /* ===== HEADER ===== */
  header{
    padding:28px 20px 18px;
    display:flex; align-items:center; gap:14px;
  }
  .logo-badge{
    width:52px; height:52px; border-radius:16px; flex:none;
    background:linear-gradient(135deg, var(--teal), #14877a);
    display:flex; align-items:center; justify-content:center; font-size:24px;
    box-shadow:0 8px 20px rgba(45,212,191,0.3);
  }
  header .titles{ min-width:0; }
  header h1{ font-size:19px; line-height:1.25; }
  header p{ margin:2px 0 0; color:var(--muted); font-size:13px; }

  /* ===== TABS ===== */
  .tabs{
    display:flex; gap:8px; padding:0 20px 16px; overflow-x:auto;
  }
  .tab{
    padding:10px 18px; border-radius:999px; background:var(--card);
    border:1px solid var(--border); color:var(--muted); font-size:13px; font-weight:600;
    white-space:nowrap; cursor:pointer; font-family:'Poppins',sans-serif;
  }
  .tab.active{ background:var(--teal); color:#04231f; border-color:var(--teal); }

  /* ===== SEARCH ===== */
  .search-wrap{ padding:0 20px 16px; }
  #searchInput{
    width:100%; padding:12px 16px; border-radius:12px; border:1px solid var(--border);
    background:var(--card); color:var(--text); font-size:14px; outline:none;
  }
  #searchInput:focus{ border-color:var(--teal); }

  /* ===== LIST ===== */
  #list{ padding:0 20px; display:flex; flex-direction:column; gap:12px; }
  .empty{
    text-align:center; color:var(--muted); padding:60px 20px; font-size:14px;
  }
  .empty .emoji{ font-size:44px; display:block; margin-bottom:12px; }

  .file-card{
    background:var(--card); border:1px solid var(--border); border-radius:16px;
    padding:14px; display:flex; gap:12px; align-items:center;
  }
  .file-icon{
    width:46px; height:46px; border-radius:12px; flex:none;
    display:flex; align-items:center; justify-content:center; font-size:20px;
  }
  .file-icon.pdf{ background:rgba(248,113,113,0.15); color:#f87171; }
  .file-icon.img{ background:rgba(45,212,191,0.15); color:var(--teal); }
  .file-icon.doc{ background:rgba(245,158,11,0.15); color:var(--orange); }
  .file-info{ flex:1; min-width:0; }
  .file-name{ font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .file-meta{ font-size:12px; color:var(--muted); margin-top:3px; display:flex; gap:8px; align-items:center; }
  .badge{
    font-size:10px; font-weight:700; padding:2px 8px; border-radius:999px;
    text-transform:uppercase; letter-spacing:0.5px;
  }
  .badge.apostila{ background:rgba(245,158,11,0.15); color:var(--orange); }
  .badge.certificado{ background:rgba(45,212,191,0.15); color:var(--teal); }
  .file-actions{ display:flex; gap:6px; flex:none; }
  .icon-btn{
    width:36px; height:36px; border-radius:10px; border:1px solid var(--border);
    background:var(--card-2); color:var(--text); display:flex; align-items:center; justify-content:center;
    font-size:15px; cursor:pointer;
  }
  .icon-btn.danger{ color:var(--danger); }

  /* ===== FAB ===== */
  #fab{
    position:fixed; bottom:26px; right:22px; z-index:50;
    width:60px; height:60px; border-radius:50%;
    background:linear-gradient(135deg, var(--teal), #14877a);
    display:flex; align-items:center; justify-content:center;
    font-size:28px; color:#04231f; border:none; cursor:pointer;
    box-shadow:0 10px 26px rgba(45,212,191,0.4);
  }

  /* ===== MODAL ADD ===== */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(5,8,16,0.7); z-index:150;
    display:flex; align-items:flex-end; justify-content:center;
  }
  .modal-overlay.hidden{ display:none; }
  .modal-sheet{
    background:var(--bg-2); width:100%; max-width:480px; border-radius:22px 22px 0 0;
    padding:22px 20px 28px; display:flex; flex-direction:column; gap:14px;
    border-top:1px solid var(--border);
  }
  .modal-sheet h3{ font-size:17px; }
  .modal-sheet label{ font-size:12px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
  .cat-choice{ display:flex; gap:10px; }
  .cat-choice button{
    flex:1; padding:12px; border-radius:12px; border:1px solid var(--border);
    background:var(--card); color:var(--text); font-weight:600; font-size:13px; cursor:pointer;
    font-family:'Poppins',sans-serif;
  }
  .cat-choice button.selected.apostila{ background:rgba(245,158,11,0.2); border-color:var(--orange); color:var(--orange); }
  .cat-choice button.selected.certificado{ background:rgba(45,212,191,0.2); border-color:var(--teal); color:var(--teal); }
  #fileNameInput{ text-align:left; }
  .file-drop{
    border:2px dashed var(--border); border-radius:14px; padding:22px; text-align:center;
    color:var(--muted); font-size:13px; cursor:pointer;
  }
  .file-drop.has-file{ border-color:var(--teal); color:var(--teal); }
  .modal-actions{ display:flex; gap:10px; margin-top:4px; }
  .modal-actions .btn{ flex:1; }

  /* ===== TOAST ===== */
  #toast{
    position:fixed; left:50%; bottom:100px; transform:translateX(-50%) translateY(20px);
    background:var(--card-2); border:1px solid var(--border); padding:12px 20px; border-radius:12px;
    font-size:13px; opacity:0; pointer-events:none; transition:0.25s; z-index:300;
    display:flex; align-items:center; gap:10px;
  }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  .spinner{
    width:14px; height:14px; border-radius:50%; border:2px solid var(--border); border-top-color:var(--teal);
    animation:spin 0.7s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* ===== ADMIN ===== */
  #adminScreen{
    position:fixed; inset:0; z-index:250; background:rgba(5,8,16,0.92);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:24px;
  }
  #adminScreen.hidden{ display:none; }
</style>

<script>
const CONFIG = {
  password: "Daxus2026",
  lockKey: "apostilas_daxus_unlocked",
  customPasswordKey: "apostilas_daxus_custom_password",
  adminPassword: "0198",
  firebaseApiKey: "AIzaSyC58yXOGfhBhVRhWWHd-Cd5zwPFRutVdoA",
  firebaseProjectId: "livros-fotos",
  seedListUrl: "arquivos.json",
  maxDirectUploadMB: 0.9 // acima disso, pedir pro Claude importar via GitHub
};

const FIRESTORE_BASE = `https://firestore.googleapis.com/v1/projects/${CONFIG.firebaseProjectId}/databases/(default)/documents`;
const COLLECTION_PATH = `apostilas_daxus/claudio/arquivos`;

// ---------- BIOMETRIA (WebAuthn - digital/Face ID do aparelho) ----------
const BIO_CRED_KEY = 'apostilas_daxus_bio_credential_id';
const BIO_ENABLED_KEY = 'apostilas_daxus_bio_enabled';

function bufToB64(buf){
  return btoa(String.fromCharCode(...new Uint8Array(buf)));
}
function b64ToBuf(b64){
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i] = bin.charCodeAt(i);
  return arr.buffer;
}

async function biometriaDisponivel(){
  if(!window.PublicKeyCredential) return false;
  try{
    return await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
  }catch(e){ return false; }
}

async function cadastrarDigital(){
  try{
    const publicKey = {
      challenge: crypto.getRandomValues(new Uint8Array(32)),
      rp: { name: "Apostilas Daxus" },
      user: {
        id: crypto.getRandomValues(new Uint8Array(16)),
        name: "claudio",
        displayName: "Claudio"
      },
      pubKeyCredParams: [{alg:-7, type:"public-key"}, {alg:-257, type:"public-key"}],
      authenticatorSelection: { authenticatorAttachment:"platform", userVerification:"required" },
      timeout: 60000,
      attestation: "none"
    };
    const cred = await navigator.credentials.create({publicKey});
    localStorage.setItem(BIO_CRED_KEY, bufToB64(cred.rawId));
    localStorage.setItem(BIO_ENABLED_KEY, 'yes');
    return true;
  }catch(e){
    console.error('Erro ao cadastrar digital', e);
    return false;
  }
}

async function desbloquearComDigital(){
  const credIdB64 = localStorage.getItem(BIO_CRED_KEY);
  if(!credIdB64) return false;
  try{
    const publicKey = {
      challenge: crypto.getRandomValues(new Uint8Array(32)),
      allowCredentials: [{ id: b64ToBuf(credIdB64), type:'public-key' }],
      userVerification: "required",
      timeout: 60000
    };
    await navigator.credentials.get({publicKey});
    return true;
  }catch(e){
    console.error('Falha na digital', e);
    return false;
  }
}

// ---------- LOCK ----------
(function initLock(){
  const lockScreen = document.getElementById('lockScreen');
  const lockInput = document.getElementById('lockInput');
  const lockBtn = document.getElementById('lockBtn');
  const lockError = document.getElementById('lockError');
  const lockSubtitle = document.getElementById('lockSubtitle');
  const biometricBtn = document.getElementById('biometricBtn');
  const enableBiometricBtn = document.getElementById('enableBiometricBtn');

  if(sessionStorage.getItem(CONFIG.lockKey) === 'yes'){
    lockScreen.classList.add('hidden');
    init();
    return;
  }

  function desbloquear(){
    sessionStorage.setItem(CONFIG.lockKey, 'yes');
    lockScreen.classList.add('hidden');
    init();
  }

  function tryUnlock(){
    const senhaAtual = localStorage.getItem(CONFIG.customPasswordKey) || CONFIG.password;
    if(lockInput.value === senhaAtual){
      // se digital disponível e ainda não cadastrada, oferece ativar
      biometriaDisponivel().then(disponivel=>{
        if(disponivel && localStorage.getItem(BIO_ENABLED_KEY) !== 'yes'){
          enableBiometricBtn.style.display = 'block';
          lockInput.style.display = 'none';
          lockBtn.style.display = 'none';
          lockSubtitle.textContent = 'Senha certa! Quer ativar a digital neste aparelho?';
          lockError.textContent = '';
          enableBiometricBtn.onclick = async ()=>{
            enableBiometricBtn.textContent = 'Aguardando digital...';
            const ok = await cadastrarDigital();
            if(ok){ desbloquear(); } else { desbloquear(); }
          };
          // permite pular e entrar direto também
          setTimeout(()=>{ if(!lockScreen.classList.contains('hidden')){} }, 0);
        } else {
          desbloquear();
        }
      });
    } else {
      lockError.textContent = 'Senha errada, tenta de novo';
      lockInput.value=''; lockInput.focus();
    }
  }

  lockBtn.addEventListener('click', tryUnlock);
  lockInput.addEventListener('keydown', e=>{ if(e.key==='Enter') tryUnlock(); });

  // permite pular a oferta de digital e entrar direto tocando fora — clique duplo no subtítulo pula
  lockSubtitle.addEventListener('dblclick', ()=>{ if(enableBiometricBtn.style.display==='block') desbloquear(); });

  // ---- oferece digital já na entrada, se cadastrada ----
  biometriaDisponivel().then(disponivel=>{
    if(disponivel && localStorage.getItem(BIO_ENABLED_KEY)==='yes'){
      biometricBtn.style.display = 'block';
      lockSubtitle.textContent = 'Use sua digital ou a senha para acessar';
      biometricBtn.addEventListener('click', async ()=>{
        biometricBtn.textContent = '👆 Aguardando digital...';
        const ok = await desbloquearComDigital();
        biometricBtn.textContent = '👆 Desbloquear com digital';
        if(ok){ desbloquear(); } else { lockError.textContent = 'Não reconheci a digital, tenta de novo ou usa a senha'; }
      });
      setTimeout(()=> biometricBtn.click(), 400); // já tenta automaticamente ao abrir
    } else {
      setTimeout(()=>lockInput.focus(), 300);
    }
  });
})();

// ---------- ADMIN (5 taps no título) ----------
(function initAdmin(){
  const adminScreen = document.getElementById('adminScreen');
  const adminInput = document.getElementById('adminInput');
  const adminBtn = document.getElementById('adminBtn');
  const adminError = document.getElementById('adminError');
  const adminPanel = document.getElementById('adminPanel');
  const newPassInput = document.getElementById('newPassInput');
  const savePassBtn = document.getElementById('savePassBtn');
  const adminMsg = document.getElementById('adminMsg');
  const closeAdminBtn = document.getElementById('closeAdminBtn');
  const titulo = document.getElementById('tituloApp');

  function fecharAdmin(){
    adminScreen.classList.add('hidden');
    adminPanel.style.display = 'none';
    adminInput.style.display = '';
    adminBtn.style.display = '';
  }
  let taps=0, timer=null;
  titulo.addEventListener('click', ()=>{
    taps++;
    clearTimeout(timer);
    timer = setTimeout(()=>{taps=0;}, 1500);
    if(taps>=5){
      taps=0;
      adminScreen.classList.remove('hidden');
      adminInput.value=''; adminError.textContent=''; adminMsg.textContent='';
      newPassInput.value='';
      adminPanel.style.display='none';
      adminInput.style.display=''; adminBtn.style.display='';
      setTimeout(()=>adminInput.focus(),200);
    }
  });
  function tryAdmin(){
    if(adminInput.value === CONFIG.adminPassword){
      adminError.textContent='';
      adminInput.style.display='none'; adminBtn.style.display='none';
      adminPanel.style.display='flex';
      setTimeout(()=>newPassInput.focus(),200);
    } else {
      adminError.textContent='Senha incorreta';
      adminInput.value=''; adminInput.focus();
    }
  }
  adminBtn.addEventListener('click', tryAdmin);
  adminInput.addEventListener('keydown', e=>{ if(e.key==='Enter') tryAdmin(); });
  savePassBtn.addEventListener('click', ()=>{
    const nova = newPassInput.value.trim();
    if(nova.length<3){ adminMsg.textContent='Digite pelo menos 3 caracteres'; return; }
    localStorage.setItem(CONFIG.customPasswordKey, nova);
    adminMsg.textContent='Senha atualizada! ✅';
    setTimeout(fecharAdmin, 1200);
  });
  newPassInput.addEventListener('keydown', e=>{ if(e.key==='Enter') savePassBtn.click(); });
  closeAdminBtn.addEventListener('click', fecharAdmin);
  adminScreen.addEventListener('click', e=>{ if(e.target===adminScreen) fecharAdmin(); });
})();

// ---------- APP STATE ----------
let arquivos = []; // {id, nome, categoria, tipo, src (dataURL or URL), createdAt, removable}
let filtroAtual = 'todos';
let termoBusca = '';

function toast(msg, loading=false){
  const t = document.getElementById('toast');
  t.innerHTML = (loading? '<div class="spinner"></div>':'') + `<span>${msg}</span>`;
  t.classList.add('show');
}
function hideToast(){ document.getElementById('toast').classList.remove('show'); }

function iconFor(tipo){
  if(tipo && tipo.includes('pdf')) return {cls:'pdf', emoji:'📄'};
  if(tipo && tipo.includes('image')) return {cls:'img', emoji:'🖼️'};
  return {cls:'doc', emoji:'📎'};
}

function formatDate(ts){
  try{
    const d = new Date(ts);
    return d.toLocaleDateString('pt-BR', {day:'2-digit', month:'short', year:'numeric'});
  }catch(e){ return ''; }
}

async function init(){
  await carregarTudo();
  render();
  document.querySelectorAll('.tab').forEach(tab=>{
    tab.addEventListener('click', ()=>{
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      filtroAtual = tab.dataset.filter;
      render();
    });
  });
  document.getElementById('searchInput').addEventListener('input', e=>{
    termoBusca = e.target.value.toLowerCase();
    render();
  });
}

async function carregarTudo(){
  arquivos = [];
  // 1) seeds estáticos (arquivos que o Claude importou do email/drive)
  try{
    const res = await fetch(CONFIG.seedListUrl, {cache:"no-store"});
    if(res.ok){
      const seeds = await res.json();
      seeds.forEach(s=> arquivos.push({...s, removable:false}));
    }
  }catch(e){ console.warn('sem arquivos.json ainda'); }

  // 2) arquivos adicionados pelo usuário (Firestore)
  try{
    const url = `${FIRESTORE_BASE}/${COLLECTION_PATH}?key=${CONFIG.firebaseApiKey}&orderBy=createdAt desc&pageSize=500`;
    const res = await fetch(url, {cache:"no-store"});
    if(res.ok){
      const data = await res.json();
      const docs = data.documents || [];
      docs.forEach(doc=>{
        const f = doc.fields || {};
        arquivos.push({
          id: doc.name.split('/').pop(),
          nome: f.nome?.stringValue || 'Sem nome',
          categoria: f.categoria?.stringValue || 'apostila',
          tipo: f.tipo?.stringValue || '',
          src: f.data?.stringValue || '',
          createdAt: Number(f.createdAt?.integerValue || 0),
          removable: true
        });
      });
    }
  }catch(e){ console.error('Erro ao carregar do Firestore', e); }

  arquivos.sort((a,b)=> (b.createdAt||0) - (a.createdAt||0));
}

function render(){
  const list = document.getElementById('list');
  let itens = arquivos.filter(a => filtroAtual==='todos' || a.categoria===filtroAtual);
  if(termoBusca) itens = itens.filter(a => a.nome.toLowerCase().includes(termoBusca));

  if(itens.length===0){
    list.innerHTML = `<div class="empty"><span class="emoji">📂</span>Nenhum arquivo aqui ainda.<br>Toque no + para adicionar.</div>`;
    return;
  }

  list.innerHTML = itens.map(a=>{
    const ic = iconFor(a.tipo);
    return `
    <div class="file-card" data-id="${a.id}">
      <div class="file-icon ${ic.cls}">${ic.emoji}</div>
      <div class="file-info">
        <div class="file-name">${a.nome}</div>
        <div class="file-meta">
          <span class="badge ${a.categoria}">${a.categoria}</span>
          ${a.createdAt ? `<span>${formatDate(a.createdAt)}</span>` : ''}
        </div>
      </div>
      <div class="file-actions">
        <button class="icon-btn" onclick="abrirArquivo('${a.id}')" title="Abrir">👁️</button>
        <button class="icon-btn" onclick="baixarArquivo('${a.id}')" title="Baixar">⬇️</button>
        ${a.removable ? `<button class="icon-btn danger" onclick="excluirArquivo('${a.id}')" title="Excluir">🗑️</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

function findArquivo(id){ return arquivos.find(a=>a.id===id); }

window.abrirArquivo = async function(id){
  const a = findArquivo(id);
  if(!a) return;
  if(a.src.startsWith('data:')){
    const w = window.open();
    w.document.write(`<iframe src="${a.src}" style="border:0;width:100%;height:100vh;"></iframe>`);
    return;
  }
  // Abre a janela ANTES do fetch para não ser bloqueada como pop-up pelo navegador
  const w = window.open('', '_blank');
  if(w){ w.document.write('Carregando...'); }
  try{
    const res = await fetch(a.src, {cache:"no-store"});
    const buf = await res.arrayBuffer();
    const mime = (a.tipo && a.tipo.includes('pdf')) ? 'application/pdf' : (a.tipo || 'application/octet-stream');
    const blob = new Blob([buf], {type: mime});
    const blobUrl = URL.createObjectURL(blob);
    if(w){ w.location.href = blobUrl; } else { window.location.href = blobUrl; }
  }catch(e){
    console.error('Erro ao abrir arquivo', e);
    if(w){ w.document.write('Erro ao carregar o arquivo. Tente baixar em vez de abrir.'); }
    toast('Erro ao abrir. Tente baixar.');
  }
};

window.baixarArquivo = async function(id){
  const a = findArquivo(id);
  if(!a) return;
  if(a.src.startsWith('data:')){
    const link = document.createElement('a');
    link.href = a.src;
    link.download = a.nome;
    document.body.appendChild(link);
    link.click();
    link.remove();
    return;
  }
  try{
    const res = await fetch(a.src, {cache:"no-store"});
    const buf = await res.arrayBuffer();
    const mime = (a.tipo && a.tipo.includes('pdf')) ? 'application/pdf' : (a.tipo || 'application/octet-stream');
    const blob = new Blob([buf], {type: mime});
    const blobUrl = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = blobUrl;
    link.download = a.nome + (a.tipo && a.tipo.includes('pdf') ? '.pdf' : '');
    document.body.appendChild(link);
    link.click();
    link.remove();
    setTimeout(()=>URL.revokeObjectURL(blobUrl), 10000);
  }catch(e){
    console.error('Erro ao baixar arquivo', e);
    toast('Erro ao baixar o arquivo.');
  }
};

window.excluirArquivo = async function(id){
  const a = findArquivo(id);
  if(!a || !a.removable) return;
  if(!confirm(`Excluir "${a.nome}"?`)) return;
  toast('Excluindo...', true);
  try{
    const url = `${FIRESTORE_BASE}/${COLLECTION_PATH}/${id}?key=${CONFIG.firebaseApiKey}`;
    await fetch(url, {method:'DELETE'});
    arquivos = arquivos.filter(x=>x.id!==id);
    render();
    toast('Excluído ✅');
  }catch(e){
    toast('Erro ao excluir ❌');
  }
  setTimeout(hideToast, 1500);
};

// ---------- MODAL ADICIONAR ----------
const modalOverlay = document.getElementById('modalOverlay');
const fab = document.getElementById('fab');
const catApostila = document.getElementById('catApostila');
const catCertificado = document.getElementById('catCertificado');
const fileDropZone = document.getElementById('fileDropZone');
const fileInputReal = document.getElementById('fileInputReal');
const fileNameInput = document.getElementById('fileNameInput');
let categoriaEscolhida = 'apostila';
let arquivoEscolhido = null;

function abrirModal(){
  modalOverlay.classList.remove('hidden');
  categoriaEscolhida = 'apostila';
  catApostila.classList.add('selected','apostila');
  catCertificado.classList.remove('selected','certificado');
  fileNameInput.value='';
  arquivoEscolhido = null;
  fileDropZone.textContent = 'Toque para escolher o arquivo';
  fileDropZone.classList.remove('has-file');
}
function fecharModal(){ modalOverlay.classList.add('hidden'); }

fab.addEventListener('click', abrirModal);
document.getElementById('cancelAddBtn').addEventListener('click', fecharModal);
modalOverlay.addEventListener('click', e=>{ if(e.target===modalOverlay) fecharModal(); });

catApostila.addEventListener('click', ()=>{
  categoriaEscolhida='apostila';
  catApostila.classList.add('selected','apostila');
  catCertificado.classList.remove('selected','certificado');
});
catCertificado.addEventListener('click', ()=>{
  categoriaEscolhida='certificado';
  catCertificado.classList.add('selected','certificado');
  catApostila.classList.remove('selected','apostila');
});

fileDropZone.addEventListener('click', ()=> fileInputReal.click());
fileInputReal.addEventListener('change', ()=>{
  const f = fileInputReal.files[0];
  if(!f) return;
  arquivoEscolhido = f;
  fileDropZone.textContent = `✅ ${f.name}`;
  fileDropZone.classList.add('has-file');
  if(!fileNameInput.value) fileNameInput.value = f.name.replace(/\.[^/.]+$/, '');
});

document.getElementById('confirmAddBtn').addEventListener('click', async ()=>{
  const nome = fileNameInput.value.trim();
  if(!nome){ alert('Digite um nome para o arquivo'); return; }
  if(!arquivoEscolhido){ alert('Escolha um arquivo'); return; }

  const sizeMB = arquivoEscolhido.size / (1024*1024);
  if(sizeMB > CONFIG.maxDirectUploadMB){
    alert(`Esse arquivo tem ${sizeMB.toFixed(1)}MB — arquivos grandes assim, peça pro Claude importar direto (fica mais rápido e seguro). Por aqui, arquivos até ~${CONFIG.maxDirectUploadMB}MB.`);
    return;
  }

  fecharModal();
  toast('Salvando arquivo...', true);

  const reader = new FileReader();
  reader.onload = async function(){
    const dataUrl = reader.result; // data:mime;base64,....
    try{
      const url = `${FIRESTORE_BASE}/${COLLECTION_PATH}?key=${CONFIG.firebaseApiKey}`;
      const body = {
        fields: {
          nome: {stringValue: nome},
          categoria: {stringValue: categoriaEscolhida},
          tipo: {stringValue: arquivoEscolhido.type || 'application/octet-stream'},
          data: {stringValue: dataUrl},
          createdAt: {integerValue: Date.now()}
        }
      };
      const res = await fetch(url, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(body)
      });
      if(res.ok){
        toast('Salvo com sucesso ✅');
        await carregarTudo();
        render();
      } else {
        toast('Erro ao salvar ❌');
      }
    }catch(e){
      console.error(e);
      toast('Erro ao salvar ❌');
    }
    setTimeout(hideToast, 1500);
  };
  reader.readAsDataURL(arquivoEscolhido);
});
</script>
