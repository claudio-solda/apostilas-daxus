<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Treinamento — Solda por Resistência</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="theme-color" content="#0b1220">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b1220; --bg-2:#121b30; --card:#16213a; --card-2:#1c2a48;
    --teal:#2dd4bf; --orange:#f59e0b; --text:#e7ecf5; --muted:#8b95ab;
    --danger:#f87171; --ok:#34d399; --border:#243252;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh;
    background:
      radial-gradient(ellipse at 20% 0%, rgba(45,212,191,0.10), transparent 55%),
      radial-gradient(ellipse at 90% 100%, rgba(245,158,11,0.08), transparent 55%),
      var(--bg);
    color:var(--text); font-family:'Inter', sans-serif; padding-bottom:60px;
  }
  h1,h2,h3{ font-family:'Poppins', sans-serif; margin:0; }
  a{ color:inherit; text-decoration:none; }

  header{ padding:24px 20px 14px; display:flex; align-items:center; gap:14px; }
  .logo-badge{
    width:52px; height:52px; border-radius:16px; flex:none;
    background:linear-gradient(135deg, var(--teal), #14877a);
    display:flex; align-items:center; justify-content:center; font-size:24px;
    box-shadow:0 8px 20px rgba(45,212,191,0.3);
  }
  header .titles{ min-width:0; }
  header h1{ font-size:19px; line-height:1.25; }
  header p{ margin:2px 0 0; color:var(--muted); font-size:13px; }
  .back-link{ padding:0 20px 6px; }
  .back-link span{ font-size:13px; color:var(--muted); }

  .progress-wrap{ padding:6px 20px 18px; }
  .progress-bar-bg{ background:var(--card); border:1px solid var(--border); border-radius:999px; height:14px; overflow:hidden; }
  .progress-bar-fill{ height:100%; background:linear-gradient(90deg, var(--teal), var(--orange)); border-radius:999px; transition:width .4s ease; }
  .progress-label{ font-size:12px; color:var(--muted); margin-top:6px; display:flex; justify-content:space-between; }

  #view{ padding:0 20px; }

  .lesson-card{
    background:var(--card); border:1px solid var(--border); border-radius:16px;
    padding:14px 16px; display:flex; gap:12px; align-items:center; margin-bottom:12px; cursor:pointer;
  }
  .lesson-card.locked{ opacity:0.55; cursor:not-allowed; }
  .lesson-num{
    width:38px; height:38px; border-radius:12px; flex:none; display:flex; align-items:center; justify-content:center;
    font-family:'Poppins',sans-serif; font-weight:700; font-size:14px;
    background:var(--card-2); color:var(--muted); border:1px solid var(--border);
  }
  .lesson-card.done .lesson-num{ background:rgba(52,211,153,0.15); color:var(--ok); border-color:var(--ok); }
  .lesson-title{ font-size:14px; font-weight:600; }
  .lesson-desc{ font-size:12px; color:var(--muted); margin-top:2px; }
  .check{ margin-left:auto; font-size:18px; color:var(--ok); flex:none; }

  .btn{
    padding:14px 22px; border-radius:14px; border:none;
    background:linear-gradient(135deg, var(--teal), #14877a);
    color:#04231f; font-weight:700; font-size:14px; cursor:pointer;
    font-family:'Poppins', sans-serif; width:100%;
  }
  .btn:disabled{ opacity:0.4; cursor:not-allowed; }
  .btn-outline{ background:transparent; border:1px solid var(--border); color:var(--text); font-weight:600; }
  .btn-final{ background:linear-gradient(135deg, var(--orange), #b45309); color:#2a1600; }

  .section-title{ font-size:12px; text-transform:uppercase; letter-spacing:0.6px; color:var(--muted); margin:22px 0 10px; font-weight:700; }

  /* Lesson detail */
  .lesson-detail{ background:var(--card); border:1px solid var(--border); border-radius:18px; padding:20px; }
  .lesson-detail h2{ font-size:18px; margin-bottom:4px; }
  .lesson-detail .desc{ color:var(--muted); font-size:13px; margin-bottom:16px; }
  .block-label{ font-family:'Poppins',sans-serif; font-weight:700; font-size:13px; color:var(--teal); margin:16px 0 6px; }
  .lesson-detail p, .lesson-detail li{ font-size:14px; line-height:1.6; color:var(--text); }
  .lesson-detail ul{ padding-left:20px; margin:0; }
  .tip-box{ background:rgba(245,158,11,0.1); border:1px solid rgba(245,158,11,0.3); border-radius:12px; padding:12px 14px; margin-top:6px; }
  .obs-box{ background:var(--card-2); border:1px solid var(--border); border-radius:12px; padding:12px 14px; margin-top:6px; font-size:13px; color:var(--muted); }
  .gallery-placeholder{ display:flex; gap:8px; overflow-x:auto; margin-top:6px; }
  .gallery-placeholder .ph{
    flex:none; width:120px; height:80px; border-radius:10px; background:var(--card-2);
    border:1px dashed var(--border); display:flex; align-items:center; justify-content:center;
    font-size:11px; color:var(--muted); text-align:center; padding:6px;
  }
  .video-placeholder{
    margin-top:6px; border-radius:12px; background:var(--card-2); border:1px dashed var(--border);
    padding:20px; text-align:center; font-size:12px; color:var(--muted);
  }

  /* Quiz */
  .quiz-q{ margin-bottom:18px; }
  .quiz-q p{ font-weight:600; margin-bottom:8px; }
  .quiz-opt{
    display:block; width:100%; text-align:left; padding:12px 14px; border-radius:12px;
    border:1px solid var(--border); background:var(--card-2); color:var(--text);
    font-size:13px; margin-bottom:8px; cursor:pointer; font-family:'Inter',sans-serif;
  }
  .quiz-opt.selected{ border-color:var(--teal); background:rgba(45,212,191,0.12); }
  .quiz-opt.correct{ border-color:var(--ok); background:rgba(52,211,153,0.15); }
  .quiz-opt.wrong{ border-color:var(--danger); background:rgba(248,113,113,0.15); }
  .quiz-result{ text-align:center; padding:20px 0; }
  .quiz-result .score{ font-family:'Poppins',sans-serif; font-size:36px; font-weight:800; }

  .glossario-item{ padding:12px 0; border-bottom:1px solid var(--border); }
  .glossario-item .termo{ font-weight:700; font-size:13px; color:var(--teal); }
  .glossario-item .def{ font-size:13px; color:var(--text); margin-top:2px; }

  /* Certificate */
  .cert{
    border:2px solid var(--teal); border-radius:18px; padding:28px 20px; text-align:center;
    background:linear-gradient(160deg, rgba(45,212,191,0.06), rgba(245,158,11,0.05));
  }
  .cert .badge{ font-size:40px; }
  .cert h2{ font-size:20px; margin:10px 0 2px; }
  .cert .curso-nome{ color:var(--orange); font-weight:700; font-size:15px; margin-bottom:14px; }
  .cert .campo{ font-size:13px; color:var(--muted); margin-top:10px; }
  .cert .valor{ font-size:15px; font-weight:700; color:var(--text); }
  .cert .codigo{ margin-top:16px; font-family:'Poppins',sans-serif; letter-spacing:1px; color:var(--teal); font-size:13px; }
  #nomeCertInput{
    width:100%; padding:12px 14px; border-radius:12px; border:1px solid var(--border);
    background:var(--card-2); color:var(--text); font-size:14px; text-align:center; margin-bottom:12px;
  }

  .top-actions{ display:flex; gap:10px; margin-bottom:16px; }
  .top-actions .btn{ width:auto; flex:none; padding:10px 16px; font-size:13px; }

  .empty-state{ text-align:center; color:var(--muted); padding:60px 20px; font-size:14px; }
</style>
</head>
<body>

<header>
  <div class="logo-badge">🎓</div>
  <div class="titles">
    <h1>Curso de Solda por Resistência</h1>
    <p>Treinamento — RELATÓRIO DE SOLDA</p>
  </div>
</header>
<div class="back-link"><a href="index.html"><span>← Voltar para Apostilas</span></a></div>

<div class="progress-wrap">
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-label"><span id="progressText">0 de 0 aulas concluídas</span><span id="progressPct">0%</span></div>
</div>

<div id="view"><div class="empty-state">Carregando curso...</div></div>

<script>
const DATA_URL = "dados/curso.json?v=" + Date.now();
const STORAGE_KEY = "treinamento_solda_progresso_v1";

let curso = null;
let progresso = { aulasConcluidas: [], quizFinalAprovado: false, quizFinalNota: 0, certificadoEmitido: false, nomeCertificado: "" };

function carregarProgresso(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) progresso = Object.assign(progresso, JSON.parse(raw));
  }catch(e){}
}
function salvarProgresso(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(progresso));
  renderProgressBar();
}
function renderProgressBar(){
  if(!curso) return;
  const total = curso.totalAulas;
  const feitas = progresso.aulasConcluidas.length;
  const pct = total ? Math.round((feitas/total)*100) : 0;
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("progressText").textContent = feitas + " de " + total + " aulas concluídas";
  document.getElementById("progressPct").textContent = pct + "%";
}

function gerarCodigoVerificacao(){
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let c = "";
  for(let i=0;i<6;i++) c += chars[Math.floor(Math.random()*chars.length)];
  return "CERT-SR-" + c;
}

async function init(){
  carregarProgresso();
  try{
    const res = await fetch(DATA_URL);
    curso = await res.json();
  }catch(e){
    document.getElementById("view").innerHTML = '<div class="empty-state">⚠️ Não foi possível carregar o curso. Verifique sua conexão.</div>';
    return;
  }
  renderProgressBar();
  renderLista();
}

function renderLista(){
  const total = curso.totalAulas;
  const feitas = progresso.aulasConcluidas.length;
  let html = '<div class="section-title">Aulas</div>';
  curso.aulas.forEach((aula, idx) => {
    const done = progresso.aulasConcluidas.includes(aula.id);
    html += `<div class="lesson-card ${done ? 'done' : ''}" onclick="abrirAula(${aula.id})">
      <div class="lesson-num">${done ? '✔' : String(idx+1).padStart(2,'0')}</div>
      <div>
        <div class="lesson-title">${aula.titulo}</div>
        <div class="lesson-desc">${aula.descricao}</div>
      </div>
    </div>`;
  });

  const todasFeitas = feitas >= total;
  html += '<div class="section-title">Avaliação Final</div>';
  html += `<div class="lesson-card ${todasFeitas ? '' : 'locked'}" onclick="${todasFeitas ? 'abrirQuizFinal()' : ''}">
    <div class="lesson-num" style="background:rgba(245,158,11,0.15);color:var(--orange);border-color:var(--orange);">🏁</div>
    <div>
      <div class="lesson-title">${curso.quizFinal.titulo}</div>
      <div class="lesson-desc">${todasFeitas ? curso.quizFinal.totalPerguntas + ' perguntas — nota mínima 70%' : 'Conclua todas as aulas para desbloquear'}</div>
    </div>
    ${progresso.quizFinalAprovado ? '<div class="check">✔</div>' : ''}
  </div>`;

  html += '<div class="section-title">Certificado</div>';
  const podeEmitir = progresso.quizFinalAprovado;
  html += `<div class="lesson-card ${podeEmitir ? '' : 'locked'}" onclick="${podeEmitir ? 'abrirCertificado()' : ''}">
    <div class="lesson-num" style="background:rgba(45,212,191,0.15);color:var(--teal);border-color:var(--teal);">🏆</div>
    <div>
      <div class="lesson-title">Certificado de Conclusão</div>
      <div class="lesson-desc">${podeEmitir ? 'Disponível para emissão' : 'Aprove o quiz final para desbloquear'}</div>
    </div>
  </div>`;

  document.getElementById("view").innerHTML = html;
}

function abrirAula(id){
  const aula = curso.aulas.find(a => a.id === id);
  if(!aula) return;
  let html = '<div class="top-actions"><button class="btn btn-outline" onclick="renderLista()">← Voltar</button></div>';
  html += '<div class="lesson-detail">';
  html += `<h2>${aula.titulo}</h2><div class="desc">${aula.descricao}</div>`;

  html += `<div class="block-label">📖 Conteúdo</div><p>${aula.conteudo.replace(/\n\n/g,'</p><p>')}</p>`;

  if(aula.exemplosPraticos && aula.exemplosPraticos.length){
    html += '<div class="block-label">🔧 Exemplos Práticos</div><ul>';
    aula.exemplosPraticos.forEach(e => html += `<li>${e}</li>`);
    html += '</ul>';
  }

  if(aula.dicasImportantes && aula.dicasImportantes.length){
    html += '<div class="block-label">💡 Dicas Importantes</div>';
    aula.dicasImportantes.forEach(d => html += `<div class="tip-box">${d}</div>`);
  }

  if(aula.observacoes){
    html += `<div class="block-label">📝 Observações</div><div class="obs-box">${aula.observacoes}</div>`;
  }

  if(aula.imagens && aula.imagens.length){
    html += '<div class="block-label">🖼 Galeria</div><div class="gallery-placeholder">';
    aula.imagens.forEach(img => html += `<div class="ph">${img.legenda}</div>`);
    html += '</div>';
  }

  if(aula.video){
    html += `<div class="block-label">▶ Vídeo</div><div class="video-placeholder">${aula.video}</div>`;
  }

  if(aula.glossario && aula.glossario.length){
    html += '<div class="block-label">📚 Glossário</div>';
    aula.glossario.forEach(g => {
      html += `<div class="glossario-item"><div class="termo">${g.termo}</div><div class="def">${g.definicao}</div></div>`;
    });
  }

  html += '</div>'; // lesson-detail

  if(aula.quizAula && aula.quizAula.length){
    html += `<div class="section-title">❓ Quiz da Aula</div><div id="quizAulaWrap"></div>`;
  }
  html += `<div style="margin-top:18px;"><button class="btn" id="concluirBtn" onclick="concluirAula(${aula.id})">✔ Concluir Aula</button></div>`;

  document.getElementById("view").innerHTML = html;

  if(aula.quizAula && aula.quizAula.length){
    renderQuiz(aula.quizAula, "quizAulaWrap", null);
  }
}

function renderQuiz(perguntas, containerId, onFinish){
  const container = document.getElementById(containerId);
  const respostas = new Array(perguntas.length).fill(null);
  let html = '';
  perguntas.forEach((q, qi) => {
    html += `<div class="quiz-q" data-qi="${qi}"><p>${qi+1}. ${q.pergunta}</p>`;
    q.opcoes.forEach((op, oi) => {
      html += `<button type="button" class="quiz-opt" onclick="selecionarResposta(this, ${qi}, ${oi}, '${containerId}')">${op}</button>`;
    });
    html += '</div>';
  });
  container.innerHTML = html;
  container.dataset.respostas = JSON.stringify(respostas);
  container.dataset.perguntas = JSON.stringify(perguntas);
}

function selecionarResposta(btn, qi, oi, containerId){
  const container = document.getElementById(containerId);
  const qBlock = container.querySelector(`.quiz-q[data-qi="${qi}"]`);
  qBlock.querySelectorAll('.quiz-opt').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  const respostas = JSON.parse(container.dataset.respostas);
  respostas[qi] = oi;
  container.dataset.respostas = JSON.stringify(respostas);
}

function concluirAula(id){
  const container = document.getElementById("quizAulaWrap");
  if(container){
    const perguntas = JSON.parse(container.dataset.perguntas || "[]");
    const respostas = JSON.parse(container.dataset.respostas || "[]");
    if(perguntas.length && respostas.includes(null)){
      alert("Responda todas as perguntas do quiz da aula antes de concluir.");
      return;
    }
    let acertos = 0;
    perguntas.forEach((q, qi) => { if(respostas[qi] === q.correta) acertos++; });
    perguntas.forEach((q, qi) => {
      const qBlock = container.querySelector(`.quiz-q[data-qi="${qi}"]`);
      const opts = qBlock.querySelectorAll('.quiz-opt');
      opts.forEach((b, oi) => {
        if(oi === q.correta) b.classList.add('correct');
        else if(oi === respostas[qi]) b.classList.add('wrong');
      });
    });
  }
  if(!progresso.aulasConcluidas.includes(id)){
    progresso.aulasConcluidas.push(id);
    salvarProgresso();
  }
  setTimeout(() => renderLista(), 600);
}

function abrirQuizFinal(){
  const perguntas = curso.quizFinal.perguntas;
  let html = '<div class="top-actions"><button class="btn btn-outline" onclick="renderLista()">← Voltar</button></div>';
  html += `<div class="lesson-detail"><h2>${curso.quizFinal.titulo}</h2><div class="desc">${perguntas.length} perguntas — nota mínima para aprovação: 70%</div>`;
  html += '<div id="quizFinalWrap"></div>';
  html += '<div style="margin-top:18px;"><button class="btn btn-final" onclick="finalizarQuizFinal()">Finalizar Avaliação</button></div>';
  html += '</div>';
  document.getElementById("view").innerHTML = html;
  renderQuiz(perguntas, "quizFinalWrap", null);
}

function finalizarQuizFinal(){
  const container = document.getElementById("quizFinalWrap");
  const perguntas = JSON.parse(container.dataset.perguntas);
  const respostas = JSON.parse(container.dataset.respostas);
  if(respostas.includes(null)){
    alert("Responda todas as perguntas antes de finalizar.");
    return;
  }
  let acertos = 0;
  perguntas.forEach((q, qi) => { if(respostas[qi] === q.correta) acertos++; });
  const nota = Math.round((acertos/perguntas.length)*100);
  progresso.quizFinalNota = nota;
  progresso.quizFinalAprovado = nota >= 70;
  salvarProgresso();

  let html = '<div class="lesson-detail quiz-result">';
  html += `<div class="score" style="color:${nota>=70 ? 'var(--ok)' : 'var(--danger)'}">${nota}%</div>`;
  html += `<p>${acertos} de ${perguntas.length} respostas corretas</p>`;
  if(nota >= 70){
    html += '<p style="color:var(--ok);font-weight:700;">✔ Aprovado! Certificado disponível.</p>';
    html += '<button class="btn" style="margin-top:10px;" onclick="abrirCertificado()">🏆 Emitir Certificado</button>';
  } else {
    html += '<p style="color:var(--danger);font-weight:700;">Nota insuficiente. Revise as aulas e tente novamente.</p>';
    html += '<button class="btn btn-outline" style="margin-top:10px;" onclick="abrirQuizFinal()">Tentar Novamente</button>';
  }
  html += '<button class="btn btn-outline" style="margin-top:10px;" onclick="renderLista()">Voltar ao Início</button>';
  html += '</div>';
  document.getElementById("view").innerHTML = html;
}

function abrirCertificado(){
  if(!progresso.codigoCertificado){
    progresso.codigoCertificado = gerarCodigoVerificacao();
  }
  const hoje = new Date().toLocaleDateString('pt-BR');
  let html = '<div class="top-actions"><button class="btn btn-outline" onclick="renderLista()">← Voltar</button></div>';
  html += '<div class="cert" id="certArea">';
  html += '<div class="badge">🏆</div>';
  html += '<h2>CERTIFICADO DE CONCLUSÃO</h2>';
  html += `<div class="curso-nome">${curso.titulo}</div>`;
  html += `<input type="text" id="nomeCertInput" placeholder="Digite o nome do operador" value="${progresso.nomeCertificado || ''}">`;
  html += `<div class="campo">Data</div><div class="valor">${hoje}</div>`;
  html += `<div class="campo">Carga Horária</div><div class="valor">${curso.totalAulas * 1} h (estimado)</div>`;
  html += `<div class="campo">Nota na avaliação final</div><div class="valor">${progresso.quizFinalNota}%</div>`;
  html += `<div class="campo">Instrutor</div><div class="valor">${curso.autor}</div>`;
  html += `<div class="codigo">${progresso.codigoCertificado}</div>`;
  html += '</div>';
  html += '<div style="margin-top:16px;"><button class="btn" onclick="salvarNomeCertificado()">Salvar Nome no Certificado</button></div>';
  html += '<div style="margin-top:10px;"><button class="btn btn-outline" onclick="window.print()">🖨 Imprimir / Salvar PDF</button></div>';
  document.getElementById("view").innerHTML = html;
}

function salvarNomeCertificado(){
  const val = document.getElementById("nomeCertInput").value.trim();
  if(!val){ alert("Digite o nome do operador."); return; }
  progresso.nomeCertificado = val;
  progresso.certificadoEmitido = true;
  salvarProgresso();
  abrirCertificado();
}

init();
</script>
</body>
</html>
